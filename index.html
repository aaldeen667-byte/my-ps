<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>لوحة الرسم الاحترافية</title>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .toolbar { background: #444; padding: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        canvas { background: white; cursor: crosshair; touch-action: none; flex-grow: 1; width: 100%; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="setTool('pen')">القلم</button>
        <button onclick="setTool('line')">خط مستقيم</button>
        <div class="color-btn" style="background: black" onclick="setColor('black')"></div>
        <div class="color-btn" style="background: red" onclick="setColor('red')"></div>
        <div class="color-btn" style="background: blue" onclick="setColor('blue')"></div>
        <button onclick="clearCanvas()" style="background: #ff4444; color: white;">مسح</button>
    </div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let painting = false, tool = 'pen', startX, startY;
        let color = 'black';

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 60; }
        window.onresize = resize; resize();

        function setTool(t) { tool = t; }
        function setColor(c) { color = c; }

        canvas.addEventListener('mousedown', e => {
            painting = true;
            startX = e.clientX - canvas.offsetLeft;
            startY = e.clientY - canvas.offsetTop;
            if(tool === 'pen') ctx.beginPath();
        });

        canvas.addEventListener('mousemove', e => {
            if(!painting) return;
            const x = e.clientX - canvas.offsetLeft;
            const y = e.clientY - canvas.offsetTop;
            
            if(tool === 'pen') {
                ctx.strokeStyle = color;
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        });

        canvas.addEventListener('mouseup', e => {
            if(tool === 'line' && painting) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
                ctx.stroke();
            }
            painting = false;
        });

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>
