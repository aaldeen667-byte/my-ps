<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Paint Pro</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .toolbar { background: #6a1b9a; padding: 12px; width: 100%; display: flex; justify-content: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); align-items: center; }
        canvas { background: white; cursor: crosshair; touch-action: none; flex-grow: 1; width: 100%; transition: background 0.3s; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 12px; font-size: 24px; background: #ddd; color: black; filter: grayscale(100%); transition: 0.2s; }
        button:hover { background: #fff; transform: scale(1.1); }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; transition: 0.2s; }
        .color-btn:hover { transform: scale(1.2); border-color: #ffd700; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="setTool('pen')">✏️</button>
        <button onclick="setTool('line')">📏</button>
        <button onclick="setTool('circle')">⭕</button>
        <button onclick="toggleTheme()">📄</button>
        
        <div class="color-btn" style="background: black" onclick="setColor('black')"></div>
        <div class="color-btn" style="background: red" onclick="setColor('red')"></div>
        <div class="color-btn" style="background: blue" onclick="setColor('blue')"></div>
        
        <button onclick="undo()">↩️</button>
        <button onclick="clearCanvas()">🗑️</button>
    </div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let painting = false, tool = 'pen', startX, startY, snapshot;
        let color = 'black';
        let isDarkMode = false;
        let history = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 80; }
        window.onresize = resize; resize();

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            canvas.style.background = isDarkMode ? '#111' : '#fff';
            // تغيير لون القلم الافتراضي حسب الخلفية
            color = isDarkMode ? 'white' : 'black';
        }

        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.imageSmoothingEnabled = true;

        function saveState() { history.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); }
        function undo() { if(history.length > 0) ctx.putImageData(history.pop(), 0, 0); }
        function setTool(t) { tool = t; }
        function setColor(c) { color = c; }

        canvas.addEventListener('mousedown', e => {
            painting = true;
            startX = e.clientX - canvas.offsetLeft;
            startY = e.clientY - canvas.offsetTop;
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            saveState();
            ctx.beginPath();
        });

        canvas.addEventListener('mousemove', e => {
            if(!painting) return;
            ctx.putImageData(snapshot, 0, 0); 
            const x = e.clientX - canvas.offsetLeft;
            const y = e.clientY - canvas.offsetTop;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;

            if(tool === 'pen') {
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if(tool === 'line') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if(tool === 'circle') {
                let radius = Math.sqrt(Math.pow(x - startX, 2) + Math.pow(y - startY, 2));
                ctx.beginPath();
                ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            }
        });

        canvas.addEventListener('mouseup', () => painting = false);
        function clearCanvas() { history = []; ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>
