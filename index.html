<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>لوحة الرسم</title>
    <style>
        body { margin: 0; background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { background: white; border: 5px solid #fff; cursor: crosshair; touch-action: none; /* ضروري لمنع التمرير عند الرسم */ }
        h1 { margin-bottom: 10px; }
        .controls { margin-top: 15px; }
        button { padding: 10px 25px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>لوحة الرسم بـ لوحة التتبع</h1>
    <canvas id="c" width="800" height="500"></canvas>
    <div class="controls">
        <button onclick="clearCanvas()">مسح اللوحة</button>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let painting = false; // متغير لتتبع حالة الرسم

        // --- إعدادات الفرشاة ---
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'black';

        // --- وظائف الرسم الأساسية ---
        function startPosition(e) {
            painting = true;
            // منع التحديد النصي أو التمرير أثناء الضغط
            e.preventDefault(); 
            draw(e); // الرسم فور الضغط
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath(); // بدء مسار جديد عند رفع الإصبع
        }

        function draw(e) {
            if (!painting) return; // لا ترسم إذا لم يكن الزر مضغوطاً

            // --- تحديد الإحداثيات بدقة للوحة التتبع ---
            let x, y;
            
            // إذا كان الحدث هو لمس أو ضغط إصبع على التراكباد
            if (e.touches) {
                x = e.touches[0].clientX - canvas.getBoundingClientRect().left;
                y = e.touches[0].clientY - canvas.getBoundingClientRect().top;
            } else {
                // إذا كان ماوس (محاكاة التراكباد)
                x = e.clientX - canvas.getBoundingClientRect().left;
                y = e.clientY - canvas.getBoundingClientRect().top;
            }

            // --- عملية الرسم ---
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.moveTo(x, y);
        }

        // --- مستمعات الأحداث (Event Listeners) ---

        // 1. الماوس (للابتوب العادي)
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        // حماية: إذا خرج المؤشر من اللوحة أثناء الضغط
        canvas.addEventListener('mouseleave', finishedPosition);

        // 2. أحداث اللمس (مهمة جداً للوحة التتبع في المتصفح)
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', draw);

        // --- وظيفة المسح ---
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); // إعادة تعيين المسار بعد المسح
        }
    </script>
</body>
</html>نيب
